<!DOCTYPE html> <!--A declaration to the browser that this is an HTML document type which will tell it how to process our code-->

<html lang="en"> <!--An opening tag to wrap all of our HTML so the browser knows where our code starts and where it ends-->

<head> <!--An opening tag to contain all the non-visible information about our web page, also known as metadata.-->
    <link rel="stylesheet" href="style.css"> <!--To connect to the stylesheet-->

    <meta charset="UTF-8">
    <!--The meta tag tells all browsers and devices to treat pixel measurements the same.
    In other words, mobile devices and browsers will shrink your page to the same scale as it would display on a desktop.
    Adding the meta viewport tag to our <head> will standardize scaling across all browsers and devices.-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerónimo Basso</title>
</head>
<body> <!--An opening tag to contain all the visible content on our web page-->
    <div>
        <h1> Site currently under construction, it's not as easy as it looks. </h1>
        <!-- "src" is an attribute for the image source that tells the browser which image to display.
        "alt" is an attribute for alternate text that tells the browser what text to display if the image can't be rendered. -->
        <img id="dog-with-pickaxe" alt="Doggy meme" src="design/photos/doggy.png">
        <img id="dog-with-helmet" alt="Doggy meme 2" src="design/photos/doggy.jpg">
        <h2> Give some cookies to Gerónimo if you want the site to be ready faster. </h2>

        <!-- The main method for adding JavaScript to our page is with the script tag which wraps around our program.
        This tells the browser that we are adding JavaScript to our page so our script isn't treated like more HTML. You can see this implemented below. -->
        <script>
            // Identifying our image
            const smiley = document.querySelector("#dog-with-pickaxe");
            // Adding reaction when image is clicked
            smiley.addEventListener("click", () => {
                alert(`Doggy says "Welcome!"`);
            });
        </script>
    </div>

</body>

</html>
