<!DOCTYPE html> <!--A declaration to the browser that this is an HTML document type which will tell it how to process our code-->

<html lang="en"> <!--An opening tag to wrap all of our HTML so the browser knows where our code starts and where it ends-->

<head> <!--An opening tag to contain all the non-visible information about our web page, also known as metadata.-->
    <link rel="stylesheet" href="style.css"> <!--To connect to the stylesheet-->

    <meta charset="UTF-8">

    <!--The meta tag tells all browsers and devices to treat pixel measurements the same.
    In other words, mobile devices and browsers will shrink your page to the same scale as it would display on a desktop.
    Adding the meta viewport tag to our <head> will standardize scaling across all browsers and devices.-->
    <meta name="viewport" content="width=device-width, initial-scale=1">



    <title>Gerónimo Basso</title>
</head>
<body> <!--An opening tag to contain all the visible content on our web page-->

</body>

</html>
